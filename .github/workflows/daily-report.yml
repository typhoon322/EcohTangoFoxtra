name: Daily Fund Report

on:
  # 北京时间 16:30–22:30，每小时一次（UTC 08:30–14:30，工作日）
  # 首次成功后后续触发会自动跳过
  schedule:
    - cron: "30 8 * * 1-5"
    - cron: "30 9 * * 1-5"
    - cron: "30 10 * * 1-5"
    - cron: "30 11 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore simulation state
        uses: actions/cache@v4
        with:
          path: |
            backend/paper_state.json
            backend/fund_state.json
          key: sim-state-v1-${{ github.ref_name }}
          restore-keys: |
            sim-state-v1-${{ github.ref_name }}
        # 注意: backtest.db 从 git checkout，不用 cache 覆盖（避免空库覆盖种子数据）

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Skip if already succeeded today
        id: skip
        run: |
          if python3 scripts/daily_run.py --check-only; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily pipeline
        if: steps.skip.outputs.skip != 'true'
        env:
          LARK_PUSH_CFG: ${{ secrets.LARK_PUSH_CFG }}
          SINA_REQUEST_DELAY: "1.0"
        run: python3 scripts/daily_run.py

      - name: Commit updated reports
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/lite_card.md docs/fund_report.md docs/.daily_run_status.json

          if git diff --staged --quiet; then
            echo "No report changes to commit"
            exit 0
          fi

          git commit -m "chore: daily report $(date -u +%Y-%m-%d)"

          # pull + 冲突自动处理 + push（最多重试 3 次）
          for attempt in 1 2 3; do
            echo "Push attempt $attempt ..."
            git pull --rebase origin main || {
              bash scripts/resolve_conflicts_ci.sh
              git rebase --continue || true
            }
            if git push origin main; then
              echo "Push succeeded"
              exit 0
            fi
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
